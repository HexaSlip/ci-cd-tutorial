name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install --force

    - name: Run tests
      run: npm test

  build_artifact:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install production dependencies
      run: npm install --production

    - name: Create artifact directory
      run: mkdir artifact

    - name: Copy project files
      run: |
        cp app.js artifact/
        cp index.js artifact/
        cp package.json artifact/
        cp package-lock.json artifact/
        cp -R __tests__ artifact/
        cp index.html artifact/
    - name: Zip artifact
      run: |
        cd artifact
        zip -r ../build-artifact.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: build-artifact.zip
  fake_deploy:
    needs: build_artifact
    runs-on: ubuntu-latest

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact

    - name: Unzip artifact
      run: unzip build-artifact.zip -d deployed_app

    - name: Simulate deployment
      run: |
        echo "Starting fake deployment..."
        ls deployed_app
        echo "Application deployed successfully (simulation)."
  deploy:
    needs: fake_deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact

    - name: Unzip artifact
      run: unzip build-artifact.zip -d deployed_app

    - name: Upload to GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: deployed_app

  deploy_pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
